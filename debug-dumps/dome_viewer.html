<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hyperspace Mountain Dome Viewer</title>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0e; color: #ddd; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; }
  #ui {
    position: absolute; top: 8px; right: 8px; width: 280px; max-height: 96vh; overflow-y: auto;
    padding: 8px 10px; background: rgba(20,22,28,0.92); border: 1px solid #333;
    border-radius: 6px;
  }
  #ui h1 { font-size: 13px; margin: 0 0 6px; color: #9cf; }
  #ui label { display: block; margin: 2px 0; cursor: pointer; user-select: none; }
  #ui label.row { display: flex; align-items: center; gap: 6px; }
  #ui input[type=checkbox] { margin: 0; }
  #ui .swatch { display: inline-block; width: 14px; height: 14px; border: 1px solid #555; border-radius: 2px; }
  #ui .count { color: #888; margin-left: auto; }
  #ui hr { border: 0; border-top: 1px solid #333; margin: 8px 0; }
  #ui .controls input[type=range] { width: 100%; }
  #pickbox {
    position: absolute; bottom: 8px; left: 8px; padding: 6px 10px;
    background: rgba(0,0,0,0.85); border: 1px solid #555; border-radius: 4px;
    pointer-events: auto;
  }
  #pickbox button {
    margin-left: 6px; background: #2a3140; border: 1px solid #4a536a; color: #cce;
    padding: 2px 8px; border-radius: 3px; cursor: pointer; font: inherit;
  }
  #pickbox button:hover { background: #36405a; }
  #legend { position: absolute; bottom: 8px; right: 8px; padding: 4px 8px; background: rgba(0,0,0,0.7); border-radius: 3px; }
  #help { position: absolute; top: 8px; left: 8px; padding: 6px 10px; background: rgba(0,0,0,0.7); border-radius: 4px; max-width: 320px; }
  .hole-toggle { color: #fc8; }
</style>
</head>
<body>
<div id="help">
  <div><strong>Mouse:</strong> Left-drag look · right-drag pan · scroll zoom · click a block to pick</div>
  <div><strong>Keys:</strong> WASD move · Space up · Shift down · R reset view</div>
  <div id="posbox" style="margin-top:4px;color:#9cf">cam: —</div>
</div>
<div id="pickbox" style="display:none">
  <span id="picktext">—</span>
  <button id="copybtn">copy coord</button>
</div>
<div id="legend">player: ★ · dome center: ◆ · hole bbox: orange wireframe</div>
<div id="ui">
  <h1 id="title">loading…</h1>
  <div class="controls">
    <label>Max Y (cutaway): <span id="ymaxval"></span></label>
    <input type="range" id="ymax" min="30" max="120" value="120" />
    <label>Min Y: <span id="yminval"></span></label>
    <input type="range" id="ymin" min="30" max="120" value="30" />
    <label class="row hole-toggle"><input type="checkbox" id="showhole" checked> show PeopleMover hole bbox</label>
    <label class="row"><input type="checkbox" id="showplayer" checked> show player marker</label>
    <label class="row"><input type="checkbox" id="showcenter" checked> show dome center</label>
    <label>Move speed: <span id="speedval">30</span> blocks/sec</label>
    <input type="range" id="speed" min="2" max="200" step="1" value="30" />
    <button id="resetbtn" style="margin-top:6px;width:100%;background:#2a3140;border:1px solid #4a536a;color:#cce;padding:4px;border-radius:3px;cursor:pointer;font:inherit">reset view (R)</button>
  </div>
  <hr/>
  <div id="types"></div>
</div>

<!-- Three.js r137 ships UMD + non-module OrbitControls; works from plain file:// -->
<script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
<script>
async function loadData() {
  const res = await fetch('dome_blocks.json');
  if (!res.ok) throw new Error('failed to load dome_blocks.json (' + res.status + '). ' +
    'If you opened this file directly, run `python3 -m http.server 8000` in this folder ' +
    'and visit http://localhost:8000/dome_viewer.html');
  return res.json();
}

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0e);
scene.fog = new THREE.Fog(0x0a0a0e, 200, 500);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(0.5, 1, 0.3);
scene.add(sun);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Renderer state we'll fill in once data is loaded.
const state = {
  meta: null,
  groups: [], // { name, color, count, mesh, positions: Int32Array }
  enabled: new Set(),
  yMin: 30,
  yMax: 120,
  holeBox: null,
  playerMarker: null,
  centerMarker: null,
  hoverHelper: null,
  speedBps: 30, // blocks per second
};

// Movement state — held across frames; applied each tick.
const keys = { fwd: 0, side: 0, up: 0 };

window.addEventListener('keydown', (e) => {
  // Don't capture WASD when the user is typing in an input.
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
  switch (e.code) {
    case 'KeyW': keys.fwd = 1; e.preventDefault(); break;
    case 'KeyS': keys.fwd = -1; e.preventDefault(); break;
    case 'KeyA': keys.side = -1; e.preventDefault(); break;
    case 'KeyD': keys.side = 1; e.preventDefault(); break;
    case 'Space': keys.up = 1; e.preventDefault(); break;
    case 'ShiftLeft':
    case 'ShiftRight': keys.up = -1; e.preventDefault(); break;
    case 'KeyR': resetView(); e.preventDefault(); break;
  }
});
window.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'KeyS': keys.fwd = 0; break;
    case 'KeyA': case 'KeyD': keys.side = 0; break;
    case 'Space':
    case 'ShiftLeft':
    case 'ShiftRight': keys.up = 0; break;
  }
});
// Lose all key state when the window loses focus (otherwise alt-tab leaves
// you drifting forever).
window.addEventListener('blur', () => { keys.fwd = keys.side = keys.up = 0; });

const _fwd = new THREE.Vector3();
const _right = new THREE.Vector3();
const _delta = new THREE.Vector3();
const WORLD_UP = new THREE.Vector3(0, 1, 0);

function applyMovement(dt) {
  if (keys.fwd === 0 && keys.side === 0 && keys.up === 0) return;
  const step = state.speedBps * dt;
  // Camera-forward projected to horizontal plane — so W/S don't dive when looking down.
  camera.getWorldDirection(_fwd);
  _fwd.y = 0;
  if (_fwd.lengthSq() < 1e-8) _fwd.set(0, 0, -1);
  _fwd.normalize();
  _right.crossVectors(_fwd, WORLD_UP).normalize();

  _delta.set(0, 0, 0);
  if (keys.fwd)  _delta.addScaledVector(_fwd, keys.fwd * step);
  if (keys.side) _delta.addScaledVector(_right, keys.side * step);
  if (keys.up)   _delta.y += keys.up * step;

  camera.position.add(_delta);
  controls.target.add(_delta);
}

function resetView() {
  if (!state.meta) return;
  const [cx, cy, cz] = state.meta.center;
  controls.target.set(cx, cy, cz);
  camera.position.set(cx + 80, cy + 50, cz + 100);
  controls.update();
}

const cubeGeom = new THREE.BoxGeometry(1, 1, 1);
const tmpMatrix = new THREE.Matrix4();
const tmpQuat = new THREE.Quaternion();
const tmpScale = new THREE.Vector3(1, 1, 1);
const tmpVec = new THREE.Vector3();

function rebuildInstanceVisibility() {
  for (const g of state.groups) {
    if (!state.enabled.has(g.name)) {
      g.mesh.count = 0;
      continue;
    }
    let visible = 0;
    const pos = g.positions;
    const n = pos.length / 3;
    for (let i = 0; i < n; i++) {
      const x = pos[i * 3];
      const y = pos[i * 3 + 1];
      const z = pos[i * 3 + 2];
      if (y < state.yMin || y > state.yMax) continue;
      tmpMatrix.compose(tmpVec.set(x, y, z), tmpQuat, tmpScale);
      g.mesh.setMatrixAt(visible, tmpMatrix);
      g.mesh.userData.indexToWorld[visible] = i;
      visible++;
    }
    g.mesh.count = visible;
    g.mesh.instanceMatrix.needsUpdate = true;
  }
}

function init(data) {
  state.meta = data.meta;
  document.getElementById('title').textContent =
    `${data.meta.dimension}  —  ${data.blocks.length} types, ` +
    `${data.blocks.reduce((s, b) => s + b.positions.length / 3, 0).toLocaleString()} blocks`;

  // Camera setup based on dome center.
  const [cx, cy, cz] = data.meta.center;
  controls.target.set(cx, cy, cz);
  camera.position.set(cx + 80, cy + 50, cz + 100);
  controls.update();

  // Hole bbox wireframe.
  const hb = data.meta.hole_bbox;
  if (hb) {
    const sx = hb.max[0] - hb.min[0] + 1;
    const sy = hb.max[1] - hb.min[1] + 1;
    const sz = hb.max[2] - hb.min[2] + 1;
    const geo = new THREE.BoxGeometry(sx, sy, sz);
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({ color: 0xff8a3a, linewidth: 2 });
    const wire = new THREE.LineSegments(edges, mat);
    wire.position.set(
      (hb.min[0] + hb.max[0] + 1) / 2,
      (hb.min[1] + hb.max[1] + 1) / 2,
      (hb.min[2] + hb.max[2] + 1) / 2
    );
    scene.add(wire);
    state.holeBox = wire;
  }

  // Player marker (gold star-ish: octahedron)
  const [px, py, pz] = data.meta.player;
  state.playerMarker = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.4),
    new THREE.MeshBasicMaterial({ color: 0xffd24a })
  );
  state.playerMarker.position.set(px, py, pz);
  scene.add(state.playerMarker);

  // Dome center marker
  state.centerMarker = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.0),
    new THREE.MeshBasicMaterial({ color: 0x6cffd4, wireframe: true })
  );
  state.centerMarker.position.set(cx, cy, cz);
  scene.add(state.centerMarker);

  // Per-type instanced meshes
  const ui = document.getElementById('types');
  for (const blk of data.blocks) {
    const positions = Int32Array.from(blk.positions);
    const count = positions.length / 3;
    const color = new THREE.Color(blk.color);
    const mat = new THREE.MeshLambertMaterial({ color });
    const mesh = new THREE.InstancedMesh(cubeGeom, mat, count);
    mesh.count = count;
    mesh.userData.name = blk.name;
    mesh.userData.indexToWorld = new Int32Array(count);
    for (let i = 0; i < count; i++) {
      const x = positions[i * 3];
      const y = positions[i * 3 + 1];
      const z = positions[i * 3 + 2];
      tmpMatrix.compose(tmpVec.set(x, y, z), tmpQuat, tmpScale);
      mesh.setMatrixAt(i, tmpMatrix);
      mesh.userData.indexToWorld[i] = i;
    }
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);

    state.groups.push({ name: blk.name, color: blk.color, count, mesh, positions });
    state.enabled.add(blk.name);

    // UI row
    const label = document.createElement('label');
    label.className = 'row';
    label.innerHTML = `<input type="checkbox" checked data-name="${blk.name}">` +
      `<span class="swatch" style="background:${blk.color}"></span>` +
      `<span>${blk.name.replace('minecraft:', '')}</span>` +
      `<span class="count">${count.toLocaleString()}</span>`;
    ui.appendChild(label);
    label.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) state.enabled.add(blk.name);
      else state.enabled.delete(blk.name);
      rebuildInstanceVisibility();
    });
  }

  // Y range sliders
  const [yMin0, yMax0] = data.meta.y_range;
  const yminEl = document.getElementById('ymin');
  const ymaxEl = document.getElementById('ymax');
  yminEl.min = yMin0; yminEl.max = yMax0; yminEl.value = yMin0;
  ymaxEl.min = yMin0; ymaxEl.max = yMax0; ymaxEl.value = yMax0;
  state.yMin = yMin0;
  state.yMax = yMax0;
  document.getElementById('yminval').textContent = state.yMin;
  document.getElementById('ymaxval').textContent = state.yMax;

  function onSlide() {
    state.yMin = +yminEl.value;
    state.yMax = +ymaxEl.value;
    if (state.yMin > state.yMax) {
      // Keep them ordered
      const t = state.yMin; state.yMin = state.yMax; state.yMax = t;
    }
    document.getElementById('yminval').textContent = state.yMin;
    document.getElementById('ymaxval').textContent = state.yMax;
    rebuildInstanceVisibility();
  }
  yminEl.addEventListener('input', onSlide);
  ymaxEl.addEventListener('input', onSlide);

  const speedEl = document.getElementById('speed');
  speedEl.addEventListener('input', () => {
    state.speedBps = +speedEl.value;
    document.getElementById('speedval').textContent = state.speedBps;
  });
  state.speedBps = +speedEl.value;
  document.getElementById('speedval').textContent = state.speedBps;
  document.getElementById('resetbtn').addEventListener('click', resetView);

  document.getElementById('showhole').addEventListener('change', (e) => {
    if (state.holeBox) state.holeBox.visible = e.target.checked;
  });
  document.getElementById('showplayer').addEventListener('change', (e) => {
    state.playerMarker.visible = e.target.checked;
  });
  document.getElementById('showcenter').addEventListener('change', (e) => {
    state.centerMarker.visible = e.target.checked;
  });

  // Hover helper (transparent yellow cube placed on the picked block)
  state.hoverHelper = new THREE.Mesh(
    new THREE.BoxGeometry(1.05, 1.05, 1.05),
    new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5, depthWrite: false })
  );
  state.hoverHelper.visible = false;
  scene.add(state.hoverHelper);
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let lastPick = null;

renderer.domElement.addEventListener('click', (event) => {
  if (event.button !== 0) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = state.groups
    .filter(g => state.enabled.has(g.name))
    .map(g => g.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length === 0) {
    document.getElementById('pickbox').style.display = 'none';
    state.hoverHelper.visible = false;
    return;
  }
  const hit = hits[0];
  const inst = hit.instanceId;
  const grp = state.groups.find(g => g.mesh === hit.object);
  if (!grp || inst === undefined) return;

  // Recover the world coord by reading the instance matrix
  hit.object.getMatrixAt(inst, tmpMatrix);
  tmpMatrix.decompose(tmpVec, tmpQuat, tmpScale);
  const x = Math.round(tmpVec.x);
  const y = Math.round(tmpVec.y);
  const z = Math.round(tmpVec.z);
  lastPick = { name: grp.name, x, y, z };

  state.hoverHelper.position.set(x, y, z);
  state.hoverHelper.visible = true;

  document.getElementById('pickbox').style.display = '';
  document.getElementById('picktext').innerHTML =
    `<span style="color:${grp.color}">${grp.name}</span>` +
    ` &nbsp;at&nbsp; <strong>(${x}, ${y}, ${z})</strong>`;
});

document.getElementById('copybtn').addEventListener('click', () => {
  if (!lastPick) return;
  const { name, x, y, z } = lastPick;
  const text = `${x}, ${y}, ${z}  // ${name}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copybtn');
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    setTimeout(() => (btn.textContent = orig), 900);
  });
});

let lastT = performance.now();
const posboxEl = document.getElementById('posbox');
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastT) / 1000, 0.1); // cap at 100ms to avoid huge jumps after tab-switch
  lastT = now;
  applyMovement(dt);
  controls.update();
  renderer.render(scene, camera);
  if (posboxEl) {
    posboxEl.textContent =
      `cam: (${camera.position.x.toFixed(1)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)})`;
  }
}

(async () => {
  try {
    const data = await loadData();
    init(data);
    animate();
  } catch (e) {
    document.getElementById('title').textContent = 'error';
    document.body.insertAdjacentHTML(
      'beforeend',
      `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f88;background:#000;padding:20px;border:1px solid #844;max-width:600px">${e.message}</div>`
    );
    throw e;
  }
})();
</script>
</body>
</html>
