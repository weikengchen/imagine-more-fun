name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos-native:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS webview-helper (universal arm64+x86_64)
        run: |
          cd native/macos
          bash build.sh

      - name: Build macOS status-helper (universal arm64+x86_64)
        run: |
          cd native/macos
          swiftc -O -target arm64-apple-macosx11.0 -o status-helper-arm64 \
            StatusHelper.swift -framework AppKit
          swiftc -O -target x86_64-apple-macosx11.0 -o status-helper-x86_64 \
            StatusHelper.swift -framework AppKit
          lipo -create -output status-helper status-helper-arm64 status-helper-x86_64
          rm status-helper-arm64 status-helper-x86_64
          file status-helper

      - uses: actions/upload-artifact@v4
        with:
          name: native-macos
          path: |
            native/macos/webview-helper
            native/macos/status-helper
          if-no-files-found: error
          retention-days: 1

  build-windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows webview-helper
        run: |
          cd native/windows
          dotnet publish WebViewHelper.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -o publish

      - name: Build Windows status-helper
        run: |
          cd native/windows/status
          dotnet publish StatusHelper.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -o publish

      - name: Collect Windows binaries
        shell: bash
        run: |
          mkdir -p native-out
          cp native/windows/publish/webview-helper.exe native-out/
          cp native/windows/publish/runtimes/win-x64/native/WebView2Loader.dll native-out/
          cp native/windows/status/publish/status-helper.exe native-out/
          ls -lh native-out/

      - uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: native-out/
          if-no-files-found: error
          retention-days: 1

  build:
    needs: [build-macos-native, build-windows-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-macos
          path: native-macos

      - uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: native-windows

      - name: Assemble native resources
        run: |
          mkdir -p src/main/resources/native/macos
          mkdir -p src/main/resources/native/windows

          # Source files for reviewability
          cp native/macos/WebViewHelper.swift src/main/resources/native/macos/
          cp native/macos/StatusHelper.swift  src/main/resources/native/macos/
          cp native/windows/WebViewHelper.cs       src/main/resources/native/windows/
          cp native/windows/WebViewHelper.csproj   src/main/resources/native/windows/
          cp native/windows/status/StatusHelper.cs       src/main/resources/native/windows/
          cp native/windows/status/StatusHelper.csproj   src/main/resources/native/windows/

          # Compiled binaries (overwrite anything checked in)
          cp native-macos/webview-helper src/main/resources/native/macos/
          cp native-macos/status-helper  src/main/resources/native/macos/
          chmod +x src/main/resources/native/macos/webview-helper
          chmod +x src/main/resources/native/macos/status-helper
          cp native-windows/webview-helper.exe   src/main/resources/native/windows/
          cp native-windows/WebView2Loader.dll   src/main/resources/native/windows/
          cp native-windows/status-helper.exe    src/main/resources/native/windows/

          echo "=== Native resources ==="
          ls -lhR src/main/resources/native/

          echo "=== Verifying key files exist ==="
          test -f src/main/resources/native/macos/webview-helper
          test -f src/main/resources/native/macos/status-helper
          test -f src/main/resources/native/windows/webview-helper.exe
          test -f src/main/resources/native/windows/status-helper.exe
          test -f src/main/resources/native/windows/WebView2Loader.dll

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew spotlessCheck build -Pmod_version=${GITHUB_REF_NAME#v} --stacktrace

      - name: Build (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew spotlessCheck build --stacktrace

      - name: Verify native binaries in JAR
        run: |
          JAR=$(ls build/libs/imaginemorefun-*.jar | grep -v sources | head -1)
          echo "Checking $JAR"
          jar tf "$JAR" | grep '^native/'
          jar tf "$JAR" | grep -q '^native/macos/webview-helper$'
          jar tf "$JAR" | grep -q '^native/macos/status-helper$'
          jar tf "$JAR" | grep -q '^native/windows/webview-helper.exe$'
          jar tf "$JAR" | grep -q '^native/windows/status-helper.exe$'
          jar tf "$JAR" | grep -q '^native/windows/WebView2Loader.dll$'

      - uses: actions/upload-artifact@v4
        with:
          name: imaginemorefun-build
          path: build/libs/imaginemorefun-*.jar
          if-no-files-found: error
          retention-days: 14

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: ${{ github.ref_name }}
          files: build/libs/imaginemorefun-*.jar
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
